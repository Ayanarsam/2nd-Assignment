<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <style>
.outer-table{
    width: 600px;
    margin: 50px auto;
    border: 1px solid #dbd1d1;
    border-radius: 10px;
    padding: 20px;
    background-color: #efecec;
}
input, textarea{
    width: 95%;
    padding: 8px;
    margin-top: 5px;
}
button{
    background-color: rgb(61, 133, 151);
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<table class="outer-table">
<tr>
<td>
<label>Name</label><br>
<input type="text" placeholder="Enter your Name"><br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your Email"><br><br>

<label>Message</label><br>
<textarea rows="4" placeholder="Type Your Message here "></textarea><br><br>

<button>Send</button>
</td>
</tr>
</table>
</body>
</html>
